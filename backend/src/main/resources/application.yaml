spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/weatherdb
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

openweather:
  api-key: ${OPENWEATHER_API_KEY}
  base-url: https://api.openweathermap.org/data/2.5

server:
  port: 8080